<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="dashboard">
        <!-- Theme Toggle Button -->
        <div class="theme-toggle-container">
            <button id="theme-toggle" aria-label="Toggle theme">
                <span class="theme-icon">🌙</span>
            </button>
        </div>

        <!-- Time Greeting Component -->
        <section class="time-greeting">
            <h1 id="greeting-display"></h1>
            <div id="time-display"></div>
            <div id="date-display"></div>
        </section>

        <!-- Focus Timer Component -->
        <section class="focus-timer">
            <h2>Focus Timer</h2>
            <div id="timer-display">25:00</div>
            <div class="timer-controls">
                <select id="timer-duration">
                    <option value="1">1 min</option>
                    <option value="5">5 min</option>
                    <option value="10">10 min</option>
                    <option value="15">15 min</option>
                    <option value="20">20 min</option>
                    <option value="25" selected>25 min</option>
                    <option value="30">30 min</option>
                    <option value="45">45 min</option>
                    <option value="60">60 min</option>
                </select>
                <button id="timer-start">Start</button>
                <button id="timer-stop">Stop</button>
                <button id="timer-reset">Reset</button>
            </div>
        </section>

        <!-- Task List Component -->
        <section class="task-list">
            <h2>Tasks</h2>
            <div class="task-input-container">
                <input type="text" id="task-input" placeholder="Enter a new task...">
                <button id="task-add-btn">Add Task</button>
            </div>
            <div class="task-sort-container">
                <label for="task-sort">Sort by:</label>
                <select id="task-sort">
                    <option value="date-oldest">Date (Oldest First)</option>
                    <option value="date-newest">Date (Newest First)</option>
                    <option value="status">Status</option>
                    <option value="alphabetical">Alphabetical</option>
                </select>
            </div>
            <ul id="task-list"></ul>
        </section>

        <!-- Quick Links Component -->
        <section class="quick-links">
            <h2>Quick Links</h2>
            <div class="link-input-container">
                <input type="text" id="link-name-input" placeholder="Link name...">
                <input type="text" id="link-url-input" placeholder="URL (https://...)">
                <button id="link-add-btn">Add Link</button>
            </div>
            <ul id="link-list"></ul>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Sorting Test - Productivity Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .test-section {
            margin: 20px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 8px;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
        }
        .test-pass {
            background: #d4edda;
            color: #155724;
        }
        .test-fail {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <main class="dashboard">
        <section class="time-greeting">
            <h1>Task Sorting Test</h1>
            <p>Testing the task sorting functionality</p>
        </section>

        <!-- Task List Component -->
        <section class="task-list">
            <h2>Tasks</h2>
            <div class="task-input-container">
                <input type="text" id="task-input" placeholder="Enter a new task...">
                <button id="task-add-btn">Add Task</button>
            </div>
            <div class="task-sort-container">
                <label for="task-sort">Sort by:</label>
                <select id="task-sort">
                    <option value="date-oldest">Date (Oldest First)</option>
                    <option value="date-newest">Date (Newest First)</option>
                    <option value="status">Status</option>
                    <option value="alphabetical">Alphabetical</option>
                </select>
            </div>
            <ul id="task-list"></ul>
        </section>

        <section class="test-section">
            <h2>Test Results</h2>
            <div id="test-results"></div>
            <button onclick="runTests()" style="margin-top: 20px; padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer;">Run Tests</button>
        </section>
    </main>

    <script src="js/app.js"></script>
    <script>
        function runTests() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '';
            
            // Clear existing tasks
            tasks.length = 0;
            
            // Test 1: Sort by date-oldest (default)
            const task1 = { id: '1', text: 'Task C', completed: false, createdAt: 1000 };
            const task2 = { id: '2', text: 'Task A', completed: false, createdAt: 3000 };
            const task3 = { id: '3', text: 'Task B', completed: true, createdAt: 2000 };
            
            tasks.push(task1, task2, task3);
            
            const sortedOldest = sortTasks(tasks, 'date-oldest');
            const test1Pass = sortedOldest[0].id === '1' && sortedOldest[1].id === '3' && sortedOldest[2].id === '2';
            addTestResult('Sort by date-oldest', test1Pass, `Expected order: 1,3,2. Got: ${sortedOldest.map(t => t.id).join(',')}`);
            
            // Test 2: Sort by date-newest
            const sortedNewest = sortTasks(tasks, 'date-newest');
            const test2Pass = sortedNewest[0].id === '2' && sortedNewest[1].id === '3' && sortedNewest[2].id === '1';
            addTestResult('Sort by date-newest', test2Pass, `Expected order: 2,3,1. Got: ${sortedNewest.map(t => t.id).join(',')}`);
            
            // Test 3: Sort by status
            const sortedStatus = sortTasks(tasks, 'status');
            const test3Pass = sortedStatus[0].completed === false && sortedStatus[1].completed === false && sortedStatus[2].completed === true;
            addTestResult('Sort by status', test3Pass, `Expected active tasks first. Got: ${sortedStatus.map(t => t.completed).join(',')}`);
            
            // Test 4: Sort alphabetically
            const sortedAlpha = sortTasks(tasks, 'alphabetical');
            const test4Pass = sortedAlpha[0].text === 'Task A' && sortedAlpha[1].text === 'Task B' && sortedAlpha[2].text === 'Task C';
            addTestResult('Sort alphabetically', test4Pass, `Expected order: A,B,C. Got: ${sortedAlpha.map(t => t.text).join(',')}`);
            
            // Test 5: setSortOrder validation
            const validResult = setSortOrder('status');
            const invalidResult = setSortOrder('invalid-order');
            const test5Pass = validResult === true && invalidResult === false;
            addTestResult('setSortOrder validation', test5Pass, `Valid order should return true, invalid should return false`);
            
            // Test 6: Original array not mutated
            const originalLength = tasks.length;
            const originalFirst = tasks[0].id;
            sortTasks(tasks, 'alphabetical');
            const test6Pass = tasks.length === originalLength && tasks[0].id === originalFirst;
            addTestResult('Original array not mutated', test6Pass, `Original array should remain unchanged`);
            
            // Render with current sort order
            renderTasks();
        }
        
        function addTestResult(testName, passed, details) {
            const resultsDiv = document.getElementById('test-results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `test-result ${passed ? 'test-pass' : 'test-fail'}`;
            resultDiv.innerHTML = `<strong>${passed ? '✓' : '✗'} ${testName}</strong><br>${details}`;
            resultsDiv.appendChild(resultDiv);
        }
        
        // Initialize the app
        document.addEventListener('DOMContentLoaded', () => {
            initTaskList();
        });
    </script>
</body>
</html>

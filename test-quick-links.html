<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Links Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    .test-section {
      margin: 20px 0;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    .test-result {
      margin: 10px 0;
      padding: 10px;
      border-radius: 3px;
    }
    .pass {
      background-color: #d4edda;
      color: #155724;
    }
    .fail {
      background-color: #f8d7da;
      color: #721c24;
    }
    button {
      margin: 5px;
      padding: 8px 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Quick Links Component - Data Layer Test</h1>
  
  <div class="test-section">
    <h2>Test Results</h2>
    <div id="test-results"></div>
  </div>

  <div class="test-section">
    <h2>Manual Tests</h2>
    <button onclick="testAddLink()">Test Add Link</button>
    <button onclick="testValidateUrl()">Test Validate URL</button>
    <button onclick="testDeleteLink()">Test Delete Link</button>
    <button onclick="testOpenLink()">Test Open Link</button>
    <button onclick="runAllTests()">Run All Tests</button>
  </div>

  <script type="module">
    import {
      generateLinkId,
      validateUrl,
      validateLinkName,
      addLink,
      deleteLink,
      openLink,
      links,
      saveLinks,
      loadLinks
    } from './js/app.js';

    // Make functions available globally for button onclick
    window.generateLinkId = generateLinkId;
    window.validateUrl = validateUrl;
    window.validateLinkName = validateLinkName;
    window.addLink = addLink;
    window.deleteLink = deleteLink;
    window.openLink = openLink;
    window.links = links;
    window.saveLinks = saveLinks;
    window.loadLinks = loadLinks;

    const resultsDiv = document.getElementById('test-results');

    function addResult(testName, passed, message = '') {
      const div = document.createElement('div');
      div.className = `test-result ${passed ? 'pass' : 'fail'}`;
      div.textContent = `${passed ? '✓' : '✗'} ${testName}${message ? ': ' + message : ''}`;
      resultsDiv.appendChild(div);
    }

    window.testAddLink = function() {
      resultsDiv.innerHTML = '';
      links.length = 0; // Clear links array
      
      // Test valid link
      const link = addLink('Google', 'https://google.com');
      addResult('Add valid link', link !== null && link.name === 'Google' && link.url === 'https://google.com');
      
      // Test invalid name
      const invalidName = addLink('', 'https://google.com');
      addResult('Reject empty name', invalidName === null);
      
      // Test invalid URL
      const invalidUrl = addLink('Test', 'not-a-url');
      addResult('Reject invalid URL', invalidUrl === null);
      
      // Test whitespace trimming
      const trimmed = addLink('  Spaced  ', '  https://example.com  ');
      addResult('Trim whitespace', trimmed !== null && trimmed.name === 'Spaced' && trimmed.url === 'https://example.com');
    };

    window.testValidateUrl = function() {
      resultsDiv.innerHTML = '';
      
      addResult('Valid HTTPS URL', validateUrl('https://google.com') === true);
      addResult('Valid HTTP URL', validateUrl('http://example.com') === true);
      addResult('Reject invalid URL', validateUrl('not-a-url') === false);
      addResult('Reject empty string', validateUrl('') === false);
      addResult('Reject whitespace', validateUrl('   ') === false);
      addResult('Reject FTP URL', validateUrl('ftp://example.com') === false);
      addResult('Reject non-string', validateUrl(123) === false);
    };

    window.testDeleteLink = function() {
      resultsDiv.innerHTML = '';
      links.length = 0; // Clear links array
      
      const link1 = addLink('Link 1', 'https://example1.com');
      const link2 = addLink('Link 2', 'https://example2.com');
      
      addResult('Two links added', links.length === 2);
      
      const deleted = deleteLink(link1.id);
      addResult('Delete link returns true', deleted === true);
      addResult('Link removed from array', links.length === 1);
      addResult('Correct link remains', links[0].id === link2.id);
      
      const deleteFail = deleteLink('non-existent-id');
      addResult('Delete non-existent returns false', deleteFail === false);
    };

    window.testOpenLink = function() {
      resultsDiv.innerHTML = '';
      
      // Mock window.open
      const originalOpen = window.open;
      let openedUrl = null;
      let openedTarget = null;
      
      window.open = function(url, target) {
        openedUrl = url;
        openedTarget = target;
      };
      
      openLink('https://example.com');
      
      addResult('Opens correct URL', openedUrl === 'https://example.com');
      addResult('Opens in new tab', openedTarget === '_blank');
      
      // Restore original window.open
      window.open = originalOpen;
    };

    window.runAllTests = function() {
      resultsDiv.innerHTML = '';
      
      // Test generateLinkId
      const id1 = generateLinkId();
      const id2 = generateLinkId();
      addResult('Generate unique IDs', id1 !== id2);
      addResult('ID format correct', /^\d+-[a-z0-9]+$/.test(id1));
      
      // Test validateLinkName
      addResult('Valid name', validateLinkName('Test Link') === true);
      addResult('Reject empty name', validateLinkName('') === false);
      addResult('Reject whitespace name', validateLinkName('   ') === false);
      addResult('Reject long name', validateLinkName('a'.repeat(101)) === false);
      addResult('Accept max length name', validateLinkName('a'.repeat(100)) === true);
      
      // Run other tests
      testValidateUrl();
      testAddLink();
      testDeleteLink();
      testOpenLink();
    };

    // Run all tests on load
    runAllTests();
  </script>
</body>
</html>
